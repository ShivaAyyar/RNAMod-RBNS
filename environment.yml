name: rbp_mod_env
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python
  - python=3.8

  # Data manipulation
  - pandas=1.5.0
  - numpy=1.23.0

  # Bioinformatics tools
  - pybedtools=0.9.0
  - pyfaidx=0.7.0
  - bedtools=2.30.0
  - samtools=1.15

  # Statistics
  - scipy=1.9.0
  - statsmodels=0.14.0

  # Visualization
  - matplotlib=3.6.0
  - seaborn=0.12.0

  # Utilities
  - tqdm=4.64.0

  # Note: NOT including the following as they are handled by RBNS pipeline:
  # - biopython (not needed, using pyfaidx instead)
  # - weblogo (RBNS pipeline handles motif logos)
  # - forgi (RBNS pipeline handles structure analysis)
